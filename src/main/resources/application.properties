# Application
spring.application.name=aastrika-service
spring.jackson.mapper.accept-case-insensitive-enums=true

# Exclude Spring Boot's Elasticsearch auto-configuration ? OpenSearch starter handles this
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRestClientAutoConfiguration

# Datasource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/aastrika_service?socketTimeout=60}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# OpenSearch
opensearch.index.master-entities=${OPENSEARCH_INDEX_MASTER_ENTITIES:master_entities}
opensearch.uris=${OPENSEARCH_URIS:http://localhost:9200}
opensearch.username=${OPENSEARCH_USERNAME:}
opensearch.password=${OPENSEARCH_PASSWORD:}
opensearch.connection-timeout=${OPENSEARCH_CONNECTION_TIMEOUT:5s}
opensearch.socket-timeout=${OPENSEARCH_SOCKET_TIMEOUT:30s}

# Server
server.port=8090

# File upload limits (entity sheet CSV / XLSX)
# Overridable per environment via MAX_FILE_SIZE / MAX_REQUEST_SIZE env vars.
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:1MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:2MB}

# Logging
logging.level.org.springframework.data.elasticsearch=${OPENSEARCH_LOG_LEVEL:WARN}
logging.level.org.hibernate.SQL=OFF
logging.level.com.aastrika.entity.service.impl.EntityMappingServiceImpl=DEBUG

# Entity types ? add new generic types here and redeploy; no code change needed
entity.entityTypeList=COMPETENCY,ROLE,ACTIVITY,POSITION,ORGANIZATION,STATE,DISTRICT,BLOCK,FACILITY,POSTING_FACILITY

# Entity map allowed parent child type combinations
entity-map.allowed-type-combinations=ORGANIZATION_POSITION,POSITION_ROLE,ROLE_ACTIVITY,ACTIVITY_COMPETENCY,STATE_DISTRICT,DISTRICT_BLOCK,BLOCK_FACILITY,FACILITY_POSTING_FACILITY,BLOCK_POSTING_FACILITY

# Entity Sheet Configuration
entity-sheet.competency-level-size=5

# Required headers (list)
entity-sheet.headers.required[0]=id
entity-sheet.headers.required[1]=entity_type
entity-sheet.headers.required[2]=name
entity-sheet.headers.required[3]=description
entity-sheet.headers.required[4]=code
entity-sheet.headers.required[5]=language

# Optional headers (list)
entity-sheet.headers.optional[0]=type
entity-sheet.headers.optional[1]=area
entity-sheet.headers.optional[2]=level_id
entity-sheet.headers.optional[3]=created_by
entity-sheet.headers.optional[4]=updated_by
entity-sheet.headers.optional[5]=reviewed_by
entity-sheet.headers.optional[6]=created_date
entity-sheet.headers.optional[7]=updated_date
entity-sheet.headers.optional[8]=reviewed_date
entity-sheet.headers.optional[9]=additional_properties

# Competency level headers (list)
entity-sheet.headers.competency-levels[0]=competency_level_1_name
entity-sheet.headers.competency-levels[1]=competency_level_1_description
entity-sheet.headers.competency-levels[2]=competency_level_2_name
entity-sheet.headers.competency-levels[3]=competency_level_2_description
entity-sheet.headers.competency-levels[4]=competency_level_3_name
entity-sheet.headers.competency-levels[5]=competency_level_3_description
entity-sheet.headers.competency-levels[6]=competency_level_4_name
entity-sheet.headers.competency-levels[7]=competency_level_4_description
entity-sheet.headers.competency-levels[8]=competency_level_5_name
entity-sheet.headers.competency-levels[9]=competency_level_5_description

# Header field mappings ? CSV column header ? EntitySheetRow Java field name.
# FORMAT: entity-sheet.header-field-mappings.<csv-header>=<EntitySheetRow field>
#
# WHAT YOU CAN CHANGE:
#   The key (left side) is the exact column header name as it appears in the uploaded CSV/XLSX.
#   If your CSV uses a different header (e.g. "Entity Code" instead of "code"), update the key here ?
#   the system will automatically pick it up without any code change.
#
# WHAT YOU MUST NOT CHANGE:
#   The value (right side) is the Java field name on EntitySheetRow. These are fixed in code.
#   Changing a value here will cause a runtime error ? the BeanWrapper will fail to find the field.
#
# ADDING A NEW COLUMN:
#   Add a new entry with the CSV header as key and the matching EntitySheetRow field name as value.
#   Ensure the corresponding field exists in EntitySheetRow, otherwise it will fail at runtime.
entity-sheet.header-field-mappings.id=entityId
entity-sheet.header-field-mappings.entity_type=entityType
entity-sheet.header-field-mappings.code=code
entity-sheet.header-field-mappings.language=language
entity-sheet.header-field-mappings.name=name
entity-sheet.header-field-mappings.description=description
entity-sheet.header-field-mappings.type=type
entity-sheet.header-field-mappings.area=area
entity-sheet.header-field-mappings.level_id=levelId
entity-sheet.header-field-mappings.created_by=createdBy
entity-sheet.header-field-mappings.updated_by=updatedBy
entity-sheet.header-field-mappings.reviewed_by=reviewedBy
entity-sheet.header-field-mappings.created_date=createdDate
entity-sheet.header-field-mappings.updated_date=updatedDate
entity-sheet.header-field-mappings.reviewed_date=reviewedDate
entity-sheet.header-field-mappings.additional_properties=additionalProperties
entity-sheet.header-field-mappings.competency_level_1_name=competencyLevel1Name
entity-sheet.header-field-mappings.competency_level_1_description=competencyLevel1Description
entity-sheet.header-field-mappings.competency_level_2_name=competencyLevel2Name
entity-sheet.header-field-mappings.competency_level_2_description=competencyLevel2Description
entity-sheet.header-field-mappings.competency_level_3_name=competencyLevel3Name
entity-sheet.header-field-mappings.competency_level_3_description=competencyLevel3Description
entity-sheet.header-field-mappings.competency_level_4_name=competencyLevel4Name
entity-sheet.header-field-mappings.competency_level_4_description=competencyLevel4Description
entity-sheet.header-field-mappings.competency_level_5_name=competencyLevel5Name
entity-sheet.header-field-mappings.competency_level_5_description=competencyLevel5Description