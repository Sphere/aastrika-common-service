# Application
spring.application.name=aastrika-service
server.port=7010

# Exclude Spring Boot's native Elasticsearch auto-configuration. The spring-data-opensearch-starter
# puts Spring Data Elasticsearch on the classpath, but the Elasticsearch client (co.elastic.clients)
# is NOT present (OpenSearch is used instead), so these auto-configs fail at startup with
# NoClassDefFoundError. Class names verified against spring-boot-autoconfigure 3.4.2.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ReactiveElasticsearchClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration

# Datasource (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres?socketTimeout=60}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Cassandra (Spring Data - auto-configured CqlSession)
# The auto-configured CqlSession CONNECTS AT STARTUP: Cassandra must be reachable and
# the keyspace must already exist, or the app will not boot.
spring.cassandra.contact-points=${CASSANDRA_CONTACT_POINTS:localhost}
spring.cassandra.port=${CASSANDRA_PORT:9042}
spring.cassandra.local-datacenter=${CASSANDRA_LOCAL_DC:datacenter1}
spring.cassandra.keyspace-name=${CASSANDRA_KEYSPACE:sunbird}
# Uncomment and set if your cluster requires authentication:
#spring.cassandra.username=${CASSANDRA_USERNAME:}
#spring.cassandra.password=${CASSANDRA_PASSWORD:}
